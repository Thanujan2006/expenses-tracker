<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpensesTracker</title>
    <link rel="icon" href="Z:\UT011307\Expensize Tracker\cost.png">
    <link rel="stylesheet" href="expenses_tracker.css">
</head>

<body>
    <div class="container">
        <div class="cardBalance">
            <div>
                <h1 style="color:rgb(241, 228, 43);">&#10024;Balance</h1>
                <h2 id="balance">Rs.</h2>
                
                <div class="summary">
                    <span class="income"><img src="icons8-picking-money-50.png"> Rs.<span id="income">0</span><br>
                    <br>
                        <span class="expense"><img src="icons8-loss-50.png"> Rs.<span id="expense">0</span>
                </div>
            </div><br>
            <div class="card">
                <select id="type">
                    <option value="0">
                    Expense
                    </option>
                    <option value="1">
                     Income
                    </option>
                </select>
                <input type="text" class="des" id="name" placeholder="Description" required>
                <input type="text"class="amo"id="amount" placeholder="0" required>
                <button onclick="additem()" class="adding">
                    Add
                </button>
            </div>
            <div class="card" id="list">

            </div>
           
        </div>
    </div>
    <script src="expenses.js"></script>
</body>

</html>
